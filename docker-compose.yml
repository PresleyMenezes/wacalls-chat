version: "3.8"

services:
  wacalls:
    image: ghcr.io/presleymenezes/wacalls-chat:latest
    container_name: wacalls
    restart: unless-stopped
    network_mode: host
    command: ["-addr", ":8081"]
    environment:
      - 'REDIS_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6380/0'
    volumes:
      - 'wacalls_data:/data'
    depends_on:
      - wacalls-redis

  wacalls-redis:
    image: 'redis:7-alpine'
    container_name: wacalls-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6380:6379'
    command:
      - redis-server
      - '--requirepass'
      - '${REDIS_PASSWORD}'
    volumes:
      - 'wacalls_redis_data:/data'

volumes:
  wacalls_data:
  wacalls_redis_data:
