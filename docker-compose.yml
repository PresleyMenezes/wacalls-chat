services:
  wacalls:
    image: ghcr.io/presleymenezes/wacalls-chat:latest
    container_name: wacalls
    restart: unless-stopped
    network_mode: host
    environment:
      - 'WACALLS_ADDR=:8081'
      - 'REDIS_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6380/0'
    volumes:
      - 'wacalls_data:/data'
      - 'wacalls_media:/app/media'
    depends_on:
      - wacalls-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wacalls.rule=Host(`chat2.sendconnect.com.br`)"
      - "traefik.http.routers.wacalls.entrypoints=websecure"
      - "traefik.http.routers.wacalls.tls.certresolver=letsencrypt"
      - "traefik.http.services.wacalls.loadbalancer.server.url=http://187.77.59.5:8081"
      - "traefik.http.routers.wacalls-http.rule=Host(`chat2.sendconnect.com.br`)"
      - "traefik.http.routers.wacalls-http.entrypoints=web"
      - "traefik.http.routers.wacalls-http.middlewares=wacalls-https-redirect"
      - "traefik.http.middlewares.wacalls-https-redirect.redirectscheme.scheme=https"

  wacalls-redis:
    image: 'redis:7-alpine'
    container_name: wacalls-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6380:6379'
    command:
      - redis-server
      - '--requirepass'
      - '${REDIS_PASSWORD}'
    volumes:
      - 'wacalls_redis_data:/data'

volumes:
  wacalls_data:
  wacalls_media:
  wacalls_redis_data:
